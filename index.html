<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Home Dealers — Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0;padding:20px}
h1{font-size:28px;font-weight:700;margin-bottom:8px;color:#fff}
.subtitle{color:#888;font-size:14px;margin-bottom:20px}
.controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.controls input,.controls select{background:#1a1a1a;border:1px solid #333;color:#e0e0e0;padding:10px 14px;border-radius:8px;font-size:14px}
.controls input{flex:1;min-width:200px}
.controls select{min-width:150px}
.controls button{background:#4ade80;color:#000;border:none;padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px}
.controls button:hover{background:#22c55e}
.controls button.red{background:#f87171}
.controls button.red:hover{background:#ef4444}
.controls button.blue{background:#60a5fa}
.controls button.blue:hover{background:#3b82f6}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.card{background:#1a1a1a;border-radius:12px;padding:16px;border:1px solid #2a2a2a;text-align:center}
.card .value{font-size:32px;font-weight:800;color:#4ade80}
.card .label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.card.blue .value{color:#60a5fa}
.card.yellow .value{color:#fbbf24}
.card.purple .value{color:#c084fc}
.section{background:#1a1a1a;border-radius:12px;padding:20px;border:1px solid #2a2a2a;margin-bottom:20px}
.section h2{font-size:16px;font-weight:600;margin-bottom:12px;color:#fff}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;border-bottom:2px solid #333;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;user-select:none}
th:hover{color:#4ade80}
td{padding:8px 10px;border-bottom:1px solid #1f1f1f;font-size:13px}
tr:hover{background:#1f1f1f}
tr.selected{background:#1a2e1a}
a{color:#60a5fa;text-decoration:none}
a:hover{text-decoration:underline}
.email-link{color:#4ade80}
.pagination{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:16px}
.pagination button{background:#222;border:1px solid #333;color:#e0e0e0;padding:6px 14px;border-radius:6px;cursor:pointer}
.pagination button:hover{background:#333}
.pagination button.active{background:#4ade80;color:#000;border-color:#4ade80}
.pagination span{color:#888;font-size:13px}
.tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.tag.en{background:#1e3a5f;color:#60a5fa}.tag.fr{background:#3b1f4e;color:#c084fc}
.tag.de{background:#1f3b1f;color:#4ade80}.tag.es{background:#4e3b1f;color:#fbbf24}
.tag.nl{background:#1f3b3b;color:#2dd4bf}.tag.it{background:#3b1f1f;color:#fca5a5}
.tag.other{background:#333;color:#999}
.check{cursor:pointer}
#selected-count{color:#fbbf24;font-weight:700}
.hidden{display:none}
footer{text-align:center;color:#555;font-size:11px;margin-top:20px;padding:16px}
</style>
</head>
<body>

<h1>🏠 Mobile Home Dealers — Database</h1>
<p class="subtitle">6,974 verified dealers • 42 countries • Searchable, sortable, exportable</p>

<div class="grid" id="stats-grid">
<div class="card"><div class="value" id="stat-total">—</div><div class="label">Total Dealers</div></div>
<div class="card blue"><div class="value" id="stat-countries">—</div><div class="label">Countries</div></div>
<div class="card yellow"><div class="value" id="stat-websites">—</div><div class="label">With Website</div></div>
<div class="card purple"><div class="value" id="stat-filtered">—</div><div class="label">Showing</div></div>
</div>

<div class="controls">
<input type="text" id="search" placeholder="🔍 Search by name, email, website or country...">
<select id="country-filter"><option value="">All Countries</option></select>
<select id="lang-filter"><option value="">All Languages</option></select>
<button onclick="exportCSV()">📥 Export Filtered CSV</button>
<button class="blue" onclick="exportSelected()">📋 Export Selected (<span id="selected-count">0</span>)</button>
<button class="red" onclick="copyEmails()">📧 Copy Emails</button>
</div>

<div class="section">
<table>
<thead>
<tr>
<th><input type="checkbox" id="select-all" onclick="toggleAll()" class="check"></th>
<th onclick="sortBy('name')">Name ↕</th>
<th onclick="sortBy('country')">Country ↕</th>
<th onclick="sortBy('email')">Email ↕</th>
<th>Website</th>
<th onclick="sortBy('language')">Lang ↕</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>
<div class="pagination" id="pagination"></div>
</div>

<footer>Mobile Home Dealer Engine v2.0 — mh_engine.py — 100% Free Methods</footer>

<script>
let allData = [];
let filtered = [];
let selected = new Set();
let currentPage = 1;
const perPage = 50;
let sortCol = 'country';
let sortDir = 1;

// Load CSV
fetch('dealers_verified_real.csv')
.then(r => r.text())
.then(csv => {
    const lines = csv.trim().split('\n');
    const headers = lines[0].split(',');
    for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        const row = {};
        headers.forEach((h, j) => row[h.trim()] = (vals[j] || '').trim());
        if (row.email) allData.push(row);
    }
    populateFilters();
    applyFilters();
});

function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQuotes = !inQuotes; }
        else if (c === ',' && !inQuotes) { result.push(current); current = ''; }
        else { current += c; }
    }
    result.push(current);
    return result;
}

function populateFilters() {
    const countries = [...new Set(allData.map(d => d.country).filter(c => c))].sort();
    const langs = [...new Set(allData.map(d => d.language).filter(l => l))].sort();
    const cf = document.getElementById('country-filter');
    countries.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cf.appendChild(o); });
    const lf = document.getElementById('lang-filter');
    langs.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l.toUpperCase(); lf.appendChild(o); });
}

document.getElementById('search').addEventListener('input', () => { currentPage = 1; applyFilters(); });
document.getElementById('country-filter').addEventListener('change', () => { currentPage = 1; applyFilters(); });
document.getElementById('lang-filter').addEventListener('change', () => { currentPage = 1; applyFilters(); });

function applyFilters() {
    const q = document.getElementById('search').value.toLowerCase();
    const country = document.getElementById('country-filter').value;
    const lang = document.getElementById('lang-filter').value;

    filtered = allData.filter(d => {
        if (country && d.country !== country) return false;
        if (lang && d.language !== lang) return false;
        if (q && !d.name.toLowerCase().includes(q) && !d.email.toLowerCase().includes(q) &&
            !(d.website||'').toLowerCase().includes(q) && !d.country.toLowerCase().includes(q)) return false;
        return true;
    });

    filtered.sort((a, b) => {
        const va = (a[sortCol] || '').toLowerCase();
        const vb = (b[sortCol] || '').toLowerCase();
        return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });

    updateStats();
    renderTable();
    renderPagination();
}

function updateStats() {
    document.getElementById('stat-total').textContent = allData.length.toLocaleString();
    document.getElementById('stat-countries').textContent = new Set(allData.map(d=>d.country).filter(c=>c)).size;
    document.getElementById('stat-websites').textContent = allData.filter(d=>d.website).length.toLocaleString();
    document.getElementById('stat-filtered').textContent = filtered.length.toLocaleString();
}

function sortBy(col) {
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    applyFilters();
}

function renderTable() {
    const start = (currentPage - 1) * perPage;
    const page = filtered.slice(start, start + perPage);
    const tbody = document.getElementById('table-body');

    tbody.innerHTML = page.map((d, i) => {
        const idx = start + i;
        const isSelected = selected.has(d.email);
        const langClass = ['en','fr','de','es','nl','it'].includes(d.language) ? d.language : 'other';
        const website = d.website ? `<a href="${d.website}" target="_blank">${d.website.replace('https://','').replace('http://','').substring(0,35)}</a>` : '—';
        return `<tr class="${isSelected ? 'selected' : ''}">
            <td><input type="checkbox" class="check" ${isSelected?'checked':''} onchange="toggleSelect('${d.email}',this)"></td>
            <td>${escHtml(d.name)}</td>
            <td>${escHtml(d.country || '?')}</td>
            <td><a href="mailto:${d.email}" class="email-link">${d.email}</a></td>
            <td>${website}</td>
            <td><span class="tag ${langClass}">${(d.language||'en').toUpperCase()}</span></td>
        </tr>`;
    }).join('');
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderPagination() {
    const total = Math.ceil(filtered.length / perPage);
    const pg = document.getElementById('pagination');
    if (total <= 1) { pg.innerHTML = ''; return; }

    let html = `<button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>`;
    const start = Math.max(1, currentPage - 3);
    const end = Math.min(total, currentPage + 3);
    if (start > 1) html += `<button onclick="goPage(1)">1</button><span>...</span>`;
    for (let i = start; i <= end; i++) {
        html += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    if (end < total) html += `<span>...</span><button onclick="goPage(${total})">${total}</button>`;
    html += `<button onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>Next →</button>`;
    html += `<span>${filtered.length} results</span>`;
    pg.innerHTML = html;
}

function goPage(p) { const total = Math.ceil(filtered.length/perPage); currentPage = Math.max(1,Math.min(total,p)); renderTable(); renderPagination(); }

function toggleSelect(email, cb) {
    if (cb.checked) selected.add(email); else selected.delete(email);
    document.getElementById('selected-count').textContent = selected.size;
    cb.closest('tr').classList.toggle('selected', cb.checked);
}

function toggleAll() {
    const checked = document.getElementById('select-all').checked;
    const start = (currentPage-1)*perPage;
    filtered.slice(start, start+perPage).forEach(d => {
        if (checked) selected.add(d.email); else selected.delete(d.email);
    });
    document.getElementById('selected-count').textContent = selected.size;
    renderTable();
}

function exportCSV() {
    const data = filtered.length ? filtered : allData;
    let csv = 'name,country,email,website,language\n';
    data.forEach(d => {
        csv += `"${(d.name||'').replace(/"/g,'""')}","${d.country||''}","${d.email}","${d.website||''}","${d.language||''}"\n`;
    });
    download(csv, `dealers_${filtered.length}_filtered.csv`, 'text/csv');
}

function exportSelected() {
    if (!selected.size) { alert('Select dealers first (checkboxes)'); return; }
    const data = allData.filter(d => selected.has(d.email));
    let csv = 'name,country,email,website,language\n';
    data.forEach(d => {
        csv += `"${(d.name||'').replace(/"/g,'""')}","${d.country||''}","${d.email}","${d.website||''}","${d.language||''}"\n`;
    });
    download(csv, `dealers_${data.length}_selected.csv`, 'text/csv');
}

function copyEmails() {
    const emails = (selected.size ? allData.filter(d=>selected.has(d.email)) : filtered).map(d=>d.email).join('\n');
    navigator.clipboard.writeText(emails).then(() => alert(`${emails.split('\n').length} emails copied!`));
}

function download(content, filename, type) {
    const blob = new Blob([content], {type});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}
</script>
</body>
</html>
